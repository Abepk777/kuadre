services:
    app:
        build: ./backend
        volumes:
            - ./backend:/var/www/kuadre
        restart: unless-stopped
        expose:
            - "80"
        env_file:
            - ./backend/.env
        networks:
            - sail
        environment:
            - APP_ENV=production
            - DB_HOST=pgsql
            - REDIS_HOST=redis
            - SERVER_NAME=:80
            - LOG_CHANNEL=stderr
        depends_on:
            - pgsql
            - redis

    scheduler:
        build: ./backend
        restart: unless-stopped
        env_file:
            - ./backend/.env
        environment:
            - APP_ENV=production
            - DB_HOST=pgsql
            - REDIS_HOST=redis
        command: php artisan schedule:work
        healthcheck:
          disable: true
        networks:
            - sail
        depends_on:
            - pgsql
            - redis
            - app

    worker:
        build: ./backend
        restart: unless-stopped
        env_file:
            - ./backend/.env
        environment:
            - APP_ENV=production
            - DB_HOST=pgsql
            - REDIS_HOST=redis
            - LOG_CHANNEL=stderr
        command: php artisan queue:work --queue=default --tries=3
        healthcheck:
          disable: true
        volumes:
            - ./backend:/var/www/kuadre
        networks:
            - sail
        depends_on:
            - pgsql
            - redis
            - app

    frontend:
        build:
            context: ./frontend
        restart: unless-stopped
        expose:
            - "80"
        environment:
            - VIRTUAL_HOST=app.kuadre.krecit.com
            - LETSENCRYPT_HOST=app.kuadre.krecit.com
            - LETSENCRYPT_EMAIL=admin@krecit.com
        volumes:
            - ./frontend/nginx.conf:/etc/nginx/conf.d/default.conf:ro
        networks:
            - sail
        depends_on:
            - app

    nginx-proxy:
        image: nginxproxy/nginx-proxy
        restart: unless-stopped
        ports:
            - "80:80"
            - "443:443"
        volumes:
            - html:/usr/share/nginx/html
            - dhparam:/etc/nginx/dhparam
            - vhost:/etc/nginx/vhost.d
            - certs:/etc/nginx/certs:ro
            - /var/run/docker.sock:/tmp/docker.sock:ro
        networks:
            - sail

    acme-companion:
        image: nginxproxy/acme-companion
        restart: unless-stopped
        volumes_from:
            - nginx-proxy
        volumes:
            - certs:/etc/nginx/certs:rw
            - acme:/etc/acme.sh
            - /var/run/docker.sock:/var/run/docker.sock:ro
        environment:
            - DEFAULT_EMAIL=admin@krecit.com
        networks:
            - sail
        depends_on:
            - nginx-proxy

    pgsql:
        image: postgres:18-alpine
        restart: unless-stopped
        environment:
            POSTGRES_DB: ${DB_DATABASE:-kuadre}
            POSTGRES_USER: ${DB_USERNAME:-kuadre}
            POSTGRES_PASSWORD: ${DB_PASSWORD:-kuadre2026}
            PGDATA: /var/lib/postgresql/data
        ports:
            - "5432:5432"
        volumes:
            - pgsql-data:/var/lib/postgresql/data
        networks:
            - sail

    redis:
        image: redis:alpine
        restart: unless-stopped
        networks:
            - sail

    evolution:
        container_name: evolution_api
        image: evoapicloud/evolution-api:latest
        restart: always
        environment:
            - AUTHENTICATION_API_KEY=kuadresecure2026
            - WEBHOOK_GLOBAL_ENABLED=false
            - DATABASE_ENABLED=true
            - DATABASE_PROVIDER=postgresql
            - DATABASE_CONNECTION_URI=postgresql://kuadre:Kuadre2026.@pgsql:5432/evolution_db?schema=public
            - DATABASE_CONNECTION_CLIENT_NAME=evolution_api
            - CACHE_REDIS_ENABLED=true
            - CACHE_REDIS_URI=redis://redis:6379/6
            - CACHE_REDIS_PREFIX_KEY=evolution
            - CONFIG_SESSION_PHONE_CLIENT=Kuadre
            - CONFIG_SESSION_PHONE_NAME=Edge
        volumes:
            - evolution-data:/evolution/instances
        networks:
            - sail
        depends_on:
            - pgsql
            - redis

    # 📦 Servidor MinIO S3 para Producción
    minio:
        image: minio/minio:latest
        container_name: kuadre_minio
        restart: unless-stopped
        environment:
            MINIO_ROOT_USER: ${AWS_ACCESS_KEY_ID:-kuadre_s3_admin}
            MINIO_ROOT_PASSWORD: ${AWS_SECRET_ACCESS_KEY:-kuadre_s3_secret_2026}
        ports:
            - "8900:8900" # Exponemos la consola web por si necesitas entrar usando IP:8900
        command: server /data --console-address ":8900"
        volumes:
            - minio-data-prod:/data
        networks:
            - sail

    # 🛠️ Automatización de creación de Bucket y política pública
    minio-setup:
        image: minio/mc:latest
        container_name: kuadre_minio_setup
        depends_on:
            - minio
        environment:
            MINIO_ROOT_USER: ${AWS_ACCESS_KEY_ID:-kuadre_s3_admin}
            MINIO_ROOT_PASSWORD: ${AWS_SECRET_ACCESS_KEY:-kuadre_s3_secret_2026}
        networks:
            - sail
        entrypoint: >
            /bin/sh -c "
            sleep 5;
            mc alias set myminio http://minio:9000 $${MINIO_ROOT_USER} $${MINIO_ROOT_PASSWORD};
            mc mb myminio/kuadre-bucket --ignore-existing;
            mc anonymous set download myminio/kuadre-bucket;
            exit 0;
            "

networks:
    sail:
        driver: bridge

volumes:
    evolution-data:
        driver: local
    pgsql-data:
        driver: local
    minio-data-prod: # Volumen persistente para almacenar tus archivos en el VPS
        driver: local
    html:
    dhparam:
    vhost:
    certs:
    acme: